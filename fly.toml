# fly.toml app configuration file generated for hiro on 2026-04-01T06:18:50+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hiro'
primary_region = 'jnb'

[build]

# Stops the old machine BEFORE starting the new one.
# This is critical for WhatsApp: prevents two machines from simultaneously
# holding the same WhatsApp session, which would kick one connection.
[deploy]
  strategy = "immediate"
  wait_timeout = "5m"

[mounts]
  source = "hiro_data"
  destination = "/app/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"
